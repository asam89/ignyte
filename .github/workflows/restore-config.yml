name: Restore admin/config.php on Hostinger

# One-off, manually-triggered job to (re)create public_html/admin/config.php
# on the server via FTP. Secrets are passed as run inputs so they never live
# in the repo. Safe to delete this workflow once config.php is restored.

on:
  workflow_dispatch:
    inputs:
      db_host:
        description: "DB host"
        required: true
        default: "localhost"
      db_name:
        description: "DB name"
        required: true
        default: "u455958927_Ignyte"
      db_user:
        description: "DB user"
        required: true
        default: "u455958927_Ignyte"
      db_pass:
        description: "DB password"
        required: true
      resend_key:
        description: "Resend API key"
        required: true
      resend_from:
        description: "Resend from email"
        required: true
        default: "newsletter@faezsports.com"

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Generate config.php
        run: |
          mkdir -p upload/admin
          cat > upload/admin/config.php <<PHP
          <?php
          define('DB_HOST', '${{ github.event.inputs.db_host }}');
          define('DB_NAME', '${{ github.event.inputs.db_name }}');
          define('DB_USER', '${{ github.event.inputs.db_user }}');
          define('DB_PASS', '${{ github.event.inputs.db_pass }}');

          define('MAILCHIMP_API_KEY', '');
          define('MAILCHIMP_AUDIENCE_ID', '');

          define('RESEND_API_KEY', '${{ github.event.inputs.resend_key }}');
          define('RESEND_FROM_EMAIL', '${{ github.event.inputs.resend_from }}');
          define('RESEND_FROM_NAME', 'IGNYTE Consulting');

          define('SITE_URL', 'https://www.ignyteconsulting.com');
          define('ADMIN_URL', SITE_URL . '/admin');

          define('SITE_MANAGER_URL', '');
          define('SITE_MANAGER_API_SECRET', '');

          ini_set('session.cookie_httponly', 1);
          ini_set('session.use_strict_mode', 1);

          function getDB() {
              static \$pdo = null;
              if (\$pdo === null) {
                  try {
                      \$pdo = new PDO(
                          'mysql:host=' . DB_HOST . ';dbname=' . DB_NAME . ';charset=utf8mb4',
                          DB_USER,
                          DB_PASS,
                          [
                              PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
                              PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
                              PDO::ATTR_EMULATE_PREPARES => false,
                          ]
                      );
                  } catch (PDOException \$e) {
                      throw new Exception('Database connection failed. Please check your config.php credentials.');
                  }
              }
              return \$pdo;
          }
          PHP
          echo "Generated config.php ($(wc -l < upload/admin/config.php) lines)"

      - name: Upload via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          # curl handles arbitrary characters in the password safely via env
          # vars + first-colon separator, unlike lftp's comma separator.
          curl --fail --show-error --ssl-reqd --ftp-create-dirs \
            --user "$FTP_USER:$FTP_PASS" \
            -T upload/admin/config.php \
            "ftp://$FTP_SERVER/public_html/admin/config.php"
          echo "Upload complete"
